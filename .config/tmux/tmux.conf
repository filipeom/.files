# The general workflow follows the config:
# * [Oh My Tmux](https://github.com/gpakosz/.tmux/)
# 
# I found the default installation of **Oh My Tmux** good. However, the config files 
# started cluttering my home directory and all the statusline addons started 
# slowing down tmux. 
#
# I decided to create a simple statusline; maintaining only the things I found relevant 
# to my workflow.
# 
# This config file has the following sections:
# 1. Genereal   - contains general configuration of tmux
# 2. Display    - window config
# 3. Navigation - navigation keybindings
# 4. Copy Mode  - copy mode bindings and config
# 5. Buffers    - buffer bindings
# 6. Statusline - statusline format and colours
#
#========================================
# 1. General
#========================================
# colors
set -g default-terminal "screen-256color"
setw -g xterm-keys on
# faster command sequences
set -s escape-time 10
# increase repeat timeout
set -sg repeat-time 600
set -s focus-events on

set -g prefix2 C-a
bind C-a send-prefix -2

set -q -g status-utf8 on
set -q -g utf8 on

set -g history-limit 5000

# edit configuration
bind e new-window -n "~/.config/tmux/tmux.conf" "sh -c '\${EDITOR:-vim} ~/.config/tmux/tmux.conf && tmux source ~/.config/tmux/tmux.conf && tmux display \"~/.config/tmux/tmux.conf sourced\"'"

# reload configuration
bind r source-file ~/.config/tmux/tmux.conf \; display '~/.config/tmux/tmux.conf sourced'

#========================================
# 2. Display
#========================================
# start windows numbering at 1
set -g base-index 1
# make pane numbering consistent with windows
setw -g pane-base-index 1

# rename window to reflect current program
setw -g automatic-rename on
# renumber windows when a window is cloed
set -g renumber-windows on

# set terminal title
set -g set-titles on
# set terminal title format
set -g set-titles-string "#h:#S ● #I:#W"

# slightly longer pane indicators display time
set -g display-panes-time 800
# sligthly longer status messages display time
set -g display-time 500

# redraw status line every 15 seconds
set -g status-interval 15

set -g monitor-activity on
set -g visual-activity off

set -g pane-border-style fg=#444444
set -g pane-active-border-style fg=cyan


#========================================
# 3. Navigation
#========================================
# create session
bind C-c new-session

# find session
bind C-f command-prompt -p find-session "switch-client -t %%"

# split current window horizontally
bind - split-window -v
# split current window vertically
bind _ split-window -h

# pane navigation
bind -r h select-pane -L 
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
# swap with the next
bind > swap-pane -D
# swap with the previous
bind < swap-pane -U

# pane resizing
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# window navigation
unbind n
unbind p
bind -r C-h previous-window
bind -r C-l next-window
bind Tab last-window

#========================================
# 4. Copy mode
#========================================
bind Enter copy-mode

run -b "tmux bind -t vi-copy v begin-selection 2> /dev/null || true"
run -b "tmux bind -T copy-mode-vi v send -X begin-selection 2> /dev/null || true"
run -b "tmux bind -t vi-copy y copy-selection 2> /dev/null || true"
run -b "tmux bind -T copy-mode-vi y send -X copy-selection-and-cancel 2> /dev/null || true"
run -b "tmux bind -t vi-copy Escape cancel 2> /dev/null | true"
run -b "tmux bind -T copy-mode-vi Escape send -X cancel 2> /dev/null || true"

#========================================
# 5. Buffers
#========================================
bind b list-buffers
bind p paste-buffer
bind P choose-buffer

#========================================
# 6. Statusline
#========================================
# status bar colors
set -g status-bg black
set -g status-fg white

# centre
set-option -g status-justify centre

# status left options
set-option -g status-left "#[fg=green,bold][#[fg=cyan]Session: #S#[fg=green]]"
set-option -g status-left-length 20

# window list options
set-window-option -g window-status-format "#[fg=cyan,dim]#I#[fg=blue]:#[default]#W"
set-window-option -g window-status-current-format "#[fg=green,bold][#[fg=cyan]#I#[fg=blue]:#[fg=colour230]#W#[fg=green]]"

# status right options
set -g status-right "#[fg=green,bold][#[fg=cyan]%d %b %H:%M#[fg=green]]"
